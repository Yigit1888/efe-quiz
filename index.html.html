<!doctype html>
<html lang="tr">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1020">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Efe Mini Oyun</title>
  <style>
    :root{
      --bg1:#0b1020; --bg2:#1a0f2e;
      --card: rgba(255,255,255,.08);
      --text:#f4f6ff; --muted: rgba(244,246,255,.75);
      --ok:#42d392; --no:#ff5a7a;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);
      background: radial-gradient(1200px 800px at 20% 10%, #3b1b7a 0%, transparent 55%),
                  radial-gradient(900px 700px at 90% 30%, #1b7a6a 0%, transparent 55%),
                  linear-gradient(160deg, var(--bg1), var(--bg2));
      display:flex; align-items:center; justify-content:center;
      padding: 22px;
      overflow:hidden;
    }
    .wrap{width:min(820px, 100%); position:relative;}
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; margin-bottom:14px;
    }
    .pill{
      padding:10px 12px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      font-size: 13px;
      color: var(--muted);
      backdrop-filter: blur(10px);
    }
    .btn{
      appearance:none; border:0;
      padding:10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      color: var(--text);
      font-weight:700;
      cursor:pointer;
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
      transition: transform .06s ease, background .2s ease, opacity .2s ease;
      touch-action: manipulation;
    }
    .btn:active{ transform: scale(.98); }
    .btn.secondary{ background: rgba(255,255,255,.08); }
    .btn.hidden{ opacity:0; pointer-events:none; }

    .card{
      background: var(--card);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(14px);
      position:relative;
      overflow:hidden;
    }
    h1{
      margin: 6px 0 10px;
      font-size: clamp(22px, 3.2vw, 34px);
      letter-spacing: .2px;
    }
    .sub{color:var(--muted); margin:0 0 18px; font-size: 15px; line-height:1.4}

    .choices{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 10px;
    }
    .choice{
      display:flex; align-items:center; justify-content:space-between;
      gap: 12px;
      padding: 14px 14px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      cursor:pointer;
      transition: background .2s ease, border-color .2s ease, transform .06s ease;
      touch-action: manipulation;
      user-select:none;
    }
    .choice:hover{ background: rgba(255,255,255,.11); border-color: rgba(255,255,255,.18); }
    .choice:active{ transform: scale(.99); }
    .choice.disabled{ opacity:.6; pointer-events:none; }

    .label{ display:flex; flex-direction:column; gap:4px; }
    .opt{ font-weight:900; font-size:14px; color: rgba(244,246,255,.88); }
    .txt{ font-size:16px; font-weight: 650; }
    .tag{
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.12);
      color: rgba(244,246,255,.8);
      white-space:nowrap;
    }

    .result{
      margin-top: 16px;
      padding: 16px 16px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.12);
      display:none;
      gap: 10px;
      align-items:flex-start;
      position:relative;
      overflow:hidden;
    }
    .emoji{ font-size: 34px; line-height:1; width: 40px; text-align:center; }
    .rtext{ display:flex; flex-direction:column; gap:4px; }
    .rtitle{ font-weight: 900; letter-spacing:.2px; }
    .rmsg{ color: rgba(244,246,255,.86); line-height:1.35; }

    .ok{ border-color: rgba(66,211,146,.35); background: rgba(66,211,146,.08); }
    .no{ border-color: rgba(255,90,122,.35); background: rgba(255,90,122,.08); }

    .footer{ margin-top: 14px; display:flex; justify-content:flex-end; gap:10px; flex-wrap:wrap; }

    /* Screen shake on wrong */
    .shake{
      animation: shake .55s ease-in-out;
    }
    @keyframes shake{
      0%,100%{ transform: translateX(0) }
      12%{ transform: translateX(-8px) }
      25%{ transform: translateX(7px) }
      37%{ transform: translateX(-6px) }
      50%{ transform: translateX(5px) }
      62%{ transform: translateX(-4px) }
      75%{ transform: translateX(3px) }
      87%{ transform: translateX(-2px) }
    }

    /* Squirrel escape overlay */
    .overlay{
      position:absolute; inset:0;
      display:none;
      align-items:center; justify-content:center;
      background: rgba(0,0,0,.25);
      backdrop-filter: blur(2px);
      z-index: 5;
    }
    .overlay.show{ display:flex; }

    .squirrel{
      width: min(520px, 92%);
      background: rgba(15,10,30,.65);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 18px;
      padding: 14px 16px 16px;
      position:relative;
      overflow:hidden;
      box-shadow: 0 18px 45px rgba(0,0,0,.45);
    }
    .squirrelTop{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      margin-bottom: 10px;
    }
    .squirrelTitle{
      font-weight: 900;
      letter-spacing:.2px;
      color: rgba(244,246,255,.92);
    }
    .squirrelSmall{ color: rgba(244,246,255,.72); font-size: 13px; }

    .runway{
      position:relative;
      height: 88px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      overflow:hidden;
    }
    .runner{
      position:absolute;
      left:-80px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 46px;
      filter: drop-shadow(0 10px 14px rgba(0,0,0,.45));
      animation: dash 1.05s cubic-bezier(.2,.8,.2,1) forwards;
    }
    .poof{
      position:absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%) scale(.8);
      font-size: 30px;
      opacity: 0;
      animation: poof 1.05s ease forwards;
      animation-delay: .65s;
    }
    @keyframes dash{
      0%{ left:-80px }
      100%{ left: calc(100% + 30px) }
    }
    @keyframes poof{
      0%{ opacity:0; transform: translateY(-50%) scale(.8); }
      40%{ opacity:1; transform: translateY(-50%) scale(1); }
      100%{ opacity:0; transform: translateY(-50%) scale(1.15); }
    }

    .overlayFooter{
      display:flex; align-items:center; justify-content:flex-end; gap:10px;
      margin-top: 12px;
    }

    /* Confetti (simple) */
    .confetti{
      position:absolute; inset:0; pointer-events:none;
      display:none;
    }
    .confetti.show{ display:block; }
    .confetti span{
      position:absolute;
      top:-10px;
      width:10px; height:16px;
      border-radius:3px;
      opacity:.9;
      animation: fall 1.2s linear forwards;
    }
    @keyframes fall{
      to{ transform: translateY(420px) rotate(300deg); opacity: 0.95; }
    }
  </style>
</head>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
  }
</script>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="pill">Mini oyun • tek soru • dokunmatik</div>
      <button class="btn" id="fsBtn" type="button">Tam ekran</button>
    </div>

    <div class="card" id="card">
      <div class="confetti" id="confetti"></div>

      <h1>Efe’nin aklında sürekli kim var?</h1>
      <p class="sub">Doğru şıkkı seç 😉</p>

      <div class="choices" id="choices">
        <div class="choice" data-choice="A">
          <div class="label">
            <div class="opt">A)</div>
            <div class="txt">Beyza</div>
          </div>
          <div class="tag">Seç</div>
        </div>

        <div class="choice" data-choice="B">
          <div class="label">
            <div class="opt">B)</div>
            <div class="txt">kediler</div>
          </div>
          <div class="tag">Seç</div>
        </div>

        <div class="choice" data-choice="C">
          <div class="label">
            <div class="opt">C)</div>
            <div class="txt">geçen gün yakalayamadığım kaypak sincap</div>
          </div>
          <div class="tag">Seç</div>
        </div>
      </div>

      <div class="result" id="result">
        <div class="emoji" id="emoji">✅</div>
        <div class="rtext">
          <div class="rtitle" id="rtitle">—</div>
          <div class="rmsg" id="rmsg">—</div>
        </div>
      </div>

      <div class="footer">
        <button class="btn secondary" id="resetBtn" type="button">Sıfırla</button>
      </div>

      <!-- Wrong-choice overlay -->
      <div class="overlay" id="overlay">
        <div class="squirrel">
          <div class="squirrelTop">
            <div>
              <div class="squirrelTitle">Sincap kaçtı!</div>
              <div class="squirrelSmall">Yanlış şık… bir daha dene 🐿️</div>
            </div>
            <div style="font-size:30px">🥲</div>
          </div>

          <div class="runway">
            <div class="runner">🐿️💨</div>
            <div class="poof">💨</div>
          </div>

          <div class="overlayFooter">
            <button class="btn hidden" id="retryBtn" type="button">Retry</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const card     = document.getElementById('card');
    const choices  = document.getElementById('choices');
    const choiceEls= Array.from(document.querySelectorAll('.choice'));
    const result   = document.getElementById('result');
    const emoji    = document.getElementById('emoji');
    const rtitle   = document.getElementById('rtitle');
    const rmsg     = document.getElementById('rmsg');
    const overlay  = document.getElementById('overlay');
    const retryBtn = document.getElementById('retryBtn');
    const confetti = document.getElementById('confetti');

    let locked = false;
    let retryTimer = null;

    function vibrate(pattern){
      try{ if (navigator.vibrate) navigator.vibrate(pattern); } catch(e){}
    }

    function lockChoices(on){
      locked = on;
      choiceEls.forEach(el => el.classList.toggle('disabled', on));
    }

    function clearConfetti(){
      confetti.classList.remove('show');
      confetti.innerHTML = '';
    }

    function popConfetti(){
      clearConfetti();
      const colors = ['#42d392','#ffd166','#ff5a7a','#7c5cff','#4cc9f0','#fcbf49'];
      const n = 26;
      for(let i=0;i<n;i++){
        const s = document.createElement('span');
        s.style.left = Math.random()*100 + '%';
        s.style.background = colors[Math.floor(Math.random()*colors.length)];
        s.style.animationDelay = (Math.random()*0.25) + 's';
        s.style.transform = `translateY(0) rotate(${Math.random()*120}deg)`;
        s.style.width = (8 + Math.random()*8) + 'px';
        s.style.height = (10 + Math.random()*12) + 'px';
        confetti.appendChild(s);
      }
      confetti.classList.add('show');
      setTimeout(clearConfetti, 1400);
    }

    function showOk(){
      lockChoices(true);
      result.classList.remove('no');
      result.classList.add('ok');
      result.style.display = 'flex';
      emoji.textContent = '✅';
      rtitle.textContent = 'Doğru bildiniz.';
      rmsg.textContent = 'Aklımda sürekli sen varsın sevgilim!';
      vibrate([30, 40, 30]);
      popConfetti();
    }

    function showNo(){
      lockChoices(true);

      // main result line
      result.classList.remove('ok');
      result.classList.add('no');
      result.style.display = 'flex';
      emoji.textContent = '🥲';
      rtitle.textContent = 'naaah';
      rmsg.textContent = '';

      // shake + overlay animation
      card.classList.remove('shake');
      void card.offsetWidth; // reflow to restart animation
      card.classList.add('shake');

      overlay.classList.add('show');
      retryBtn.classList.add('hidden');
      vibrate([80, 60, 80]);

      // show Retry after a bit
      clearTimeout(retryTimer);
      retryTimer = setTimeout(() => {
        retryBtn.classList.remove('hidden');
      }, 2500);
    }

    function resetAll(){
      lockChoices(false);
      overlay.classList.remove('show');
      retryBtn.classList.add('hidden');
      result.style.display = 'none';
      result.classList.remove('ok','no');
      emoji.textContent = '✅';
      rtitle.textContent = '—';
      rmsg.textContent = '—';
      clearConfetti();
      vibrate(20);
    }

    choices.addEventListener('click', (e) => {
      if(locked) return;
      const el = e.target.closest('.choice');
      if(!el) return;
      const c = el.dataset.choice;
      if(c === 'A') showOk();
      else showNo();
    });

    document.getElementById('resetBtn').addEventListener('click', resetAll);
    retryBtn.addEventListener('click', resetAll);

    // Fullscreen button (Android browsers generally ok)
    document.getElementById('fsBtn').addEventListener('click', async () => {
      const el = document.documentElement;
      try{
        if(!document.fullscreenElement){
          await el.requestFullscreen();
        }else{
          await document.exitFullscreen();
        }
      }catch(err){ /* ignore */ }
    });
  </script>
</body>
</html>
